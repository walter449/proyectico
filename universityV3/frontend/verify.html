<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verificación</title>
</head>
<body>
    <h2>Verificar cuenta</h2>
    <p>Ingresa el código de 6 dígitos que enviamos a tu correo.</p>
    <form id="verify-form">
        <div>
            <label for="otp">Código de verificación</label>
            <input type="text" id="otp" maxlength="6" required>
        </div>
        <button type="submit">Verificar</button>
    </form>

    <script>
        document.getElementById("verify-form").addEventListener("submit", async (e) => {
            e.preventDefault();
            const email = localStorage.getItem("pending_email");
            const otp_code = document.getElementById("otp").value;

            if (!email) {
                alert("Sesión expirada. Vuelve a registrarte.");
                window.location.href = "/register.html";
                return;
            }

            const response = await fetch("/auth/verify", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ email, otp_code })
            });

            const data = await response.json();
            if (response.ok) {
                alert("Cuenta verificada. Ahora puedes iniciar sesión.");
                localStorage.removeItem("pending_email");
                window.location.href = "/login.html";
            } else {
                alert(data.detail || "Código incorrecto");
            }
        });
    </script>
</body>
</html>
